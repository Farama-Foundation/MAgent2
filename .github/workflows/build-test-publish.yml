# This workflow will build and (if release) publish Python distributions to PyPI
# For more information see:
#   - https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions
#   - https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
#

name: Build, test and publish Python package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-24.04, macos-14 ]
        python: [ 310, 311, 312, 313, 314 ]

    steps:
    - uses: actions/checkout@v4
    - name: Build Linux wheels
      if: matrix.os == 'ubuntu-24.04'
      uses: pypa/cibuildwheel@v3.4.1
      env:
        CIBW_BUILD: cp${{ matrix.python }}-manylinux_x86_64
        CIBW_ARCHS: auto
        CIBW_BUILD_VERBOSITY: 1

    - name: Build macOS wheels
      if: matrix.os == 'macos-14'
      uses: pypa/cibuildwheel@v3.4.1
      env:
        CIBW_BUILD: cp${{ matrix.python }}-macosx_arm64
        CIBW_ARCHS: auto
        CIBW_BUILD_VERBOSITY: 1

    - name: Store Linux wheels
      if: matrix.os == 'ubuntu-24.04'
      uses: actions/upload-artifact@v4
      with:
        name: dist-linux-cp${{ matrix.python }}-manylinux_x86_64
        path: ./wheelhouse/*.whl

    - name: Store macOS wheels
      if: matrix.os == 'macos-14'
      uses: actions/upload-artifact@v4
      with:
        name: dist-macos-cp${{ matrix.python }}-macosx_arm64
        path: ./wheelhouse/*.whl

  test:
    runs-on: ${{ matrix.os }}
    needs:
    - build-wheels
    strategy:
      matrix:
        os: [ ubuntu-24.04, macos-14 ]
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Download Linux wheels
      if: matrix.os == 'ubuntu-24.04'
      uses: actions/download-artifact@v4
      with:
        pattern: dist-linux-cp*-manylinux_x86_64
        path: dist
        merge-multiple: true

    - name: Download macOS wheels
      if: matrix.os == 'macos-14'
      uses: actions/download-artifact@v4
      with:
        pattern: dist-macos-cp*-macosx_arm64
        path: dist
        merge-multiple: true

    - name: Install wheel and test dependencies
      run: |
        export PYTHON_VERSION=$(python -c "import sys; print(f'{sys.version_info.major}{sys.version_info.minor}')")
        python -m pip install --upgrade pip
        python -m pip install pytest "dist/"*"cp${PYTHON_VERSION}"*.whl

    - name: Remove source package
      run: rm -rf magent2

    - name: Run tests
      run: python -m pytest tests

  build-src:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build src
      run: |
        python -m pip install --upgrade pip
        pip install wheel
        python setup.py sdist
    - name: Store src
      uses: actions/upload-artifact@v4
      with:
        name: dist-source
        path: dist/*.tar.gz

  build-wheels-ms:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
        include:
        - os: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Build wheel
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run:  |
        pip install wheel cmake-build-extension
        pip wheel .  --no-deps -w wheelhouse/

    - uses: actions/upload-artifact@v4
      with:
        name: dist-windows-py${{ matrix.python-version }}
        path: ./wheelhouse/*.whl

  test-ms:
    runs-on: windows-latest
    needs:
    - build-wheels-ms
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64

    - name: Download wheel
      uses: actions/download-artifact@v4
      with:
        name: dist-windows-py${{ matrix.python-version }}
        path: dist

    - name: Install wheel and test dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest
        python -m pip install (Get-ChildItem dist/*.whl)

    - name: Remove source package
      shell: pwsh
      run: Remove-Item -Recurse -Force magent2

    - name: Run tests
      run: python -m pytest tests

  publish:
    runs-on: ubuntu-latest
    needs:
    - build-wheels
    - build-wheels-ms
    - build-src
    - test
    - test-ms
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
    - name: Download dists
      uses: actions/download-artifact@v4
      with:
        pattern: dist-*
        path: dist
        merge-multiple: true
    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
